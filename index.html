<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Морской Бой 2.0</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body>
    <div class="container">
        <h1>Морской Бой: Эволюция 🌊</h1>
        
        <!-- Панель подключения -->
        <div id="connection-panel">
            <p>Твой ID: <strong id="my-id" style="color:#0be881;">Генерация...</strong></p>
            <div class="connect-box">
                <input type="text" id="enemy-id" placeholder="Введи ID друга">
                <button id="connect-btn">Подключиться</button>
            </div>
            <p id="status">Ожидание подключения...</p>
        </div>

        <!-- Игровая зона -->
        <div id="game-zone" style="display: none;">
            
            <!-- ПАНЕЛЬ РАССТАНОВКИ (Новое!) -->
            <div id="setup-panel">
                <h2>Подготовка флота</h2>
                <div class="setup-controls">
                    <button id="random-btn">🎲 Перемешать</button>
                    <button id="rotate-btn">🔄 Поворот: Горизонт.</button>
                    <button id="ready-btn">✅ В БОЙ!</button>
                </div>
                <p id="setup-instruction">Нажми на корабль или мину на своем поле, чтобы передвинуть вручную</p>
            </div>

            <!-- Панель статуса в бою -->
            <div class="top-panel" id="battle-panel" style="display: none;">
                <h2 id="turn-indicator">Ожидание противника...</h2>
            </div>

            <!-- Спецумения -->
            <div class="skills-panel" id="skills-panel" style="display: none;">
                <button id="skill-radar" class="skill-btn">📡 Радар (1)</button>
                <button id="skill-airstrike" class="skill-btn">✈️ Авиаудар (1)</button>
                <button id="skill-cancel" class="skill-btn cancel" style="display:none;">❌ Отмена</button>
            </div>
            
            <div class="boards">
                <div class="board-wrapper">
                    <h3>Твой флот</h3>
                    <div id="my-board" class="board"></div>
                </div>
                <div class="board-wrapper">
                    <h3>Территория врага</h3>
                    <div id="enemy-board" class="board disabled"></div>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
